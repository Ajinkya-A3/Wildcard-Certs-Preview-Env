apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-route
  namespace: default
spec:
  parentRefs:
    - name: wildcard-gateway
      namespace: gateway-system
  hostnames:
    - "test1.cybersyntric.online"
    - "test2.cybersyntric.online"
    - "api.cybersyntric.online"
  rules:
    - backendRefs:
        - name: test-service
          port: 80